<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tracker</title>
    <link rel="manifest" href="manifest.json">
    
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.tailwindcss.com">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "18d1e593-4b61-4987-befb-c5933694288b", 
                safari_web_id: "web.onesignal.auto.220e9b0b-02d4-465b-a5d3-49d3d287ceee", 
                notifyButton: { enable: true, position: 'bottom-left', offset: { bottom: '85px', right: '15px' } },
                serviceWorkerParam: { scope: "/ai-tracker-pwa/" },
                serviceWorkerPath: "ai-tracker-pwa/sw.js"
            });
        });
    </script>
    
    <style>
        #native-splash { position: fixed; inset: 0; z-index: 999999; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s ease; }
        .spinner-ring { width: 48px; height: 48px; border: 4px solid #f3f4f6; border-top-color: #5D6B7F; border-radius: 50%; animation: spin 1s linear infinite; }
        .splash-text { margin-top: 20px; font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; color: #6b7280; letter-spacing: 2px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (prefers-color-scheme: dark) { #native-splash { background-color: #111827; } .spinner-ring { border-color: #374151; border-top-color: #9ca3af; } .splash-text { color: #9ca3af; } }
        #app-root { visibility: hidden; opacity: 0; transition: opacity 0.4s ease; }
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: 2000px; }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #ffffff; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 8px;}
    </style>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300 pb-24 relative">

    <div id="native-splash">
        <div class="spinner-ring"></div>
        <div class="splash-text">LOADING PORTFOLIO</div>
    </div>

    <div id="app-root">

        <div id="pin-overlay" class="fixed inset-0 bg-gray-200 dark:bg-gray-800 z-[100] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
            <div class="bg-white dark:bg-gray-700 p-8 rounded-2xl shadow-2xl w-full max-w-xs text-center">
                <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">Login</h2>
                <div class="relative w-full mb-4">
                    <input type="password" id="pin-input" inputmode="numeric" maxlength="4" oninput="if(this.value.length === 4) validatePin()" class="w-full text-center text-3xl tracking-[1em] p-3 border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg focus:border-gray-500 outline-none pr-12" placeholder="****">
                    <button onclick="togglePinVisibility()" type="button" class="absolute inset-y-0 right-3 flex items-center text-gray-500 dark:text-gray-400 focus:outline-none">
                        <svg id="pin-eye-icon" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                    </button>
                </div>
                <div id="pin-error" class="text-red-500 font-bold text-xs mb-4 hidden">Incorrect PIN.</div>
                <button onclick="validatePin()" class="w-full bg-gray-800 dark:bg-gray-100 dark:text-gray-900 text-white font-bold py-3 rounded-lg active:scale-95 transition-transform">Login</button>
            </div>
        </div>

        <header class="bg-[#5D6B7F] dark:bg-[#2D3748] p-4 text-white shadow-md sticky top-0 z-50 grid grid-cols-[40px_1fr_40px] items-center text-center">
            <button onclick="toggleTheme()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
            <div>
                <h1 id="header-title" class="text-lg font-bold uppercase tracking-tight">Home</h1>
                <div id="global-stats" class="text-[10px] opacity-90">Initializing...</div>
            </div>
            <button onclick="togglePrivacy()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="privacy-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
        </header>

        <div id="sub-nav" class="flex border-b border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-[68px] z-40 text-[11px] sm:text-sm"></div>

        <main id="app-content" class="p-2 space-y-4"></main>

        <div class="fixed bottom-24 right-4 flex flex-col gap-3 z-40">
            <button id="fab-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-12 h-12 bg-gray-700 dark:bg-gray-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-all duration-300 opacity-0 pointer-events-none translate-y-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"></path></svg>
            </button>
            <button id="fab-back" onclick="switchMainTab('home')" class="w-12 h-12 bg-gray-700 dark:bg-gray-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-95 transition-transform" style="display: none;">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 12H5m7 7l-7-7 7-7"></path></svg>
            </button>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 h-20 flex justify-between items-center z-50 shadow-2xl transition-colors px-1">
            <button onclick="switchMainTab('home')" id="nav-home" class="flex flex-col items-center text-gray-400 flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011-1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold">HOME</span>
            </button>
            <button onclick="switchMainTab('fds')" id="nav-fds" class="flex flex-col items-center text-gray-900 dark:text-white flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold">HT FDs</span>
            </button>
            <button onclick="switchMainTab('nct')" id="nav-nct" class="flex flex-col items-center text-gray-400 flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold">NCT FDs</span>
            </button>
            <button onclick="switchMainTab('ncd')" id="nav-ncd" class="flex flex-col items-center text-gray-400 flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z"></path><path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold">HT NCDs</span>
            </button>
            <button onclick="switchMainTab('cash')" id="nav-cash" class="flex flex-col items-center text-gray-400 flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 3h12"/><path d="M6 8h12"/><path d="M6 13l8.5 8"/><path d="M6 13a3 3 0 0 0 0-5"/>
                </svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold whitespace-nowrap">HT CASH</span>
            </button>
            <button onclick="switchMainTab('cash_nct')" id="nav-cash_nct" class="flex flex-col items-center text-gray-400 flex-1 px-1">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="2" width="20" height="20" rx="4" ry="4"/>
                    <path d="M7 6h10"/><path d="M7 10h10"/><path d="M7 14l7 6"/><path d="M7 14a4 4 0 0 0 0-4"/>
                </svg>
                <span class="text-[8px] sm:text-[9px] mt-1 font-bold whitespace-nowrap">NCT CASH</span>
            </button>
        </nav>
    </div>

    <script>
        let touchstartX = 0; let touchendX = 0; let touchstartY = 0; let touchendY = 0;

        window.addEventListener('DOMContentLoaded', () => {
            applyInitialTheme();
            const root = document.getElementById('app-root');
            const splash = document.getElementById('native-splash');
            root.style.visibility = 'visible'; root.style.opacity = '1';
            setTimeout(() => { if (splash) splash.style.display = 'none'; }, 400);

            if (sessionStorage.getItem('isUnlocked') === 'true') {
                document.getElementById('pin-overlay').style.display = 'none';
                init(); 
            }

            const contentBlock = document.getElementById('app-content');
            contentBlock.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; touchstartY = e.changedTouches[0].screenY; }, {passive: true});
            contentBlock.addEventListener('touchend', e => {
                touchendX = e.changedTouches[0].screenX; touchendY = e.changedTouches[0].screenY;
                const isScrollableTable = e.target.closest('.overflow-x-auto');
                if (isScrollableTable && isScrollableTable.scrollWidth > isScrollableTable.clientWidth) return; 
                handleSwipeDirection();
            }, {passive: true});

            window.addEventListener('scroll', () => {
                const fabTop = document.getElementById('fab-top');
                if (!fabTop) return;
                if (window.scrollY > 150) {
                    fabTop.classList.remove('opacity-0', 'pointer-events-none', 'translate-y-4');
                    fabTop.classList.add('opacity-100', 'translate-y-0');
                } else {
                    fabTop.classList.add('opacity-0', 'pointer-events-none', 'translate-y-4');
                    fabTop.classList.remove('opacity-100', 'translate-y-0');
                }
            }, { passive: true });
        });

        function handleSwipeDirection() {
            const dx = touchendX - touchstartX; const dy = touchendY - touchstartY;
            if (Math.abs(dy) > Math.abs(dx)) return;
            
            const homeViews = ['dashboard', 'networth', 'tickers'];
            const otherViews = ['maturity', 'bank'];
            const activeViews = currentTab === 'home' ? homeViews : (currentTab.startsWith('cash') ? [] : otherViews);
            
            if(activeViews.length === 0) return;

            const currentIndex = activeViews.indexOf(currentSubView);
            const swipeThreshold = 50; 
            
            if (dx < -swipeThreshold && currentIndex < activeViews.length - 1) { showSubView(activeViews[currentIndex + 1]); } 
            else if (dx > swipeThreshold && currentIndex > 0) { showSubView(activeViews[currentIndex - 1]); }
        }

        const API_URL = "https://script.google.com/macros/s/AKfycbzk4LUBXFiVq3U-8ojdCe5Xni9_yYqlPCBb_4X-F6afbJM9S-lV1-2N_ukVxUYYzQytTg/exec"; 
        const SECRET_PIN = "1549";
        
        let activeData = [];
        let tickerData = { headers: [], rows: [] };
        let currentTab = 'home', currentSubView = 'dashboard', isPrivacyMode = true;
        let currentChartInstance = null;
        let cashTimestamp = "Never";
        let isEditingCash = false;
        
        const fmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
        const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        function applyInitialTheme() {
            const stored = localStorage.getItem('theme');
            const hour = new Date().getHours();
            setTheme(stored || ((hour >= 18 || hour < 6) ? 'dark' : 'light'));
        }

        function setTheme(theme) {
            const el = document.documentElement;
            theme === 'dark' ? el.classList.add('dark') : el.classList.remove('dark');
            localStorage.setItem('theme', theme); updateIcons();
            if (activeData.length > 0 || tickerData.rows.length > 0) renderView();
        }

        function toggleTheme() { setTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark'); }

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerHTML = isDark 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />` 
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;
            document.getElementById('privacy-icon').innerHTML = isPrivacyMode 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268-2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>` 
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
        }

        async function switchMainTab(tab) {
            currentTab = tab;
            isEditingCash = false; 
            
            const titles = { 'home': 'Net Worth', 'fds': 'Hitesh FD\'s', 'nct': 'NCT FD\'s', 'ncd': 'HT NCD\'s', 'cash': 'HT Cash', 'cash_nct': 'NCT Cash' };
            document.getElementById('header-title').innerText = titles[tab];
            
            const subNav = document.getElementById('sub-nav');
            subNav.style.display = 'flex'; 
            
            if (tab === 'home') {
                currentSubView = 'dashboard';
                subNav.innerHTML = `
                    <button onclick="showSubView('dashboard')" class="flex-1 p-2 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white transition-colors" id="btn-dashboard">Dashboard</button>
                    <button onclick="showSubView('networth')" class="flex-1 p-2 font-bold text-gray-400 dark:text-gray-500 border-none transition-colors" id="btn-networth">Net Worth</button>
                    <button onclick="showSubView('tickers')" class="flex-1 p-2 font-bold text-gray-400 dark:text-gray-500 border-none transition-colors" id="btn-tickers">Tickers</button>
                `;
            } else if (tab === 'cash' || tab === 'cash_nct') {
                currentSubView = 'cash';
                subNav.style.display = 'none'; 
            } else {
                currentSubView = 'maturity';
                const bankText = (tab === 'ncd') ? 'NBFC-wise' : 'Bank-wise';
                subNav.innerHTML = `
                    <button onclick="showSubView('maturity')" class="flex-1 p-3 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white transition-colors" id="btn-maturity">Maturity</button>
                    <button onclick="showSubView('bank')" class="flex-1 p-3 font-bold text-gray-400 dark:text-gray-500 border-none transition-colors" id="btn-bank">${bankText}</button>
                `;
            }

            const backBtn = document.getElementById('fab-back');
            if (backBtn) backBtn.style.display = tab === 'home' ? 'none' : 'flex';

            ['home', 'fds', 'nct', 'ncd', 'cash', 'cash_nct'].forEach(t => {
                document.getElementById('nav-' + t).className = `flex flex-col items-center flex-1 px-1 transition-colors ${t === tab ? 'text-gray-900 dark:text-white' : 'text-gray-400'}`;
            });

            document.getElementById('app-content').innerHTML = '<div class="flex justify-center p-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#5D6B7F]" style="border-right-color: transparent;"></div></div>';
            document.getElementById('global-stats').innerHTML = 'Fetching data...';
            
            try {
                const paramMap = { 'home': 'HOME', 'fds': 'HT', 'nct': 'NCT', 'ncd': 'NCD', 'cash': 'CASH_HT', 'cash_nct': 'CASH_NCT' };
                const response = await fetch(`${API_URL}?user=${paramMap[tab]}`);
                const data = await response.json();
                if (data.error) throw new Error(data.error);
                
                if (tab === 'home') {
                    activeData = data.assets || []; tickerData = data.tickers || { headers: [], rows: [] };
                } else if (tab === 'cash' || tab === 'cash_nct') {
                    activeData = data.items || []; cashTimestamp = data.lastUpdated || "Never";
                } else {
                    activeData = data; tickerData = { headers: [], rows: [] };
                }

                updateStats(); renderView();
            } catch (e) {
                document.getElementById('app-content').innerHTML = `<div class="p-6 text-red-500 bg-red-50 rounded-lg text-sm font-bold border border-red-200">Connection Error:<br>${e.message}</div>`;
                document.getElementById('global-stats').innerHTML = 'Error loading';
            }
        }

        function showSubView(view) {
            currentSubView = view;
            const active = "flex-1 p-2 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white transition-colors";
            const inactive = "flex-1 p-2 font-bold text-gray-400 dark:text-gray-500 border-none transition-colors";
            
            if (currentTab === 'home') {
                document.getElementById('btn-dashboard').className = view === 'dashboard' ? active : inactive;
                document.getElementById('btn-networth').className = view === 'networth' ? active : inactive;
                document.getElementById('btn-tickers').className = view === 'tickers' ? active : inactive;
            } else if (!currentTab.startsWith('cash')) {
                document.getElementById('btn-maturity').className = view === 'maturity' ? active : inactive;
                document.getElementById('btn-bank').className = view === 'bank' ? active : inactive;
            }
            renderView();
        }

        function togglePinVisibility() {
            const input = document.getElementById('pin-input'); const icon = document.getElementById('pin-eye-icon');
            if (input.type === 'password') {
                input.type = 'tel'; icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268-2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>`;
            } else {
                input.type = 'password'; icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />`;
            }
        }

        function togglePrivacy() { isPrivacyMode = !isPrivacyMode; updateIcons(); updateStats(); renderView(); }
        function displayMoney(amt) { return isPrivacyMode && !isEditingCash ? fmt.format(amt).replace(/[0-9]/g, 'X') : fmt.format(amt); }

        function validatePin() {
            const pinInput = document.getElementById('pin-input');
            if (pinInput.value === SECRET_PIN) {
                pinInput.blur(); sessionStorage.setItem('isUnlocked', 'true');
                document.getElementById('pin-overlay').classList.add('opacity-0', 'pointer-events-none'); init();
            } else {
                document.getElementById('pin-error').classList.remove('hidden'); pinInput.value = "";
            }
        }

        function init() { switchMainTab('home'); }

        function updateStats() {
            const total = activeData.reduce((s, item) => s + item.amount, 0);
            if (currentTab === 'home' || currentTab.startsWith('cash')) {
                document.getElementById('global-stats').innerHTML = `Total: ${displayMoney(total)}`;
            } else if (currentTab === 'ncd') {
                document.getElementById('global-stats').innerHTML = `Inv: ${displayMoney(total)}`;
            } else {
                const mat = activeData.reduce((s, f) => s + f.maturityAmount, 0);
                document.getElementById('global-stats').innerHTML = `Inv: ${displayMoney(total)} | Mat: ${displayMoney(mat)}`;
            }
        }

        function renderSharedChart(canvasId, labels, data, totalValue) {
            const ctx = document.getElementById(canvasId); if (!ctx) return;
            if (currentChartInstance) currentChartInstance.destroy();
            const bgColors = ['#9D4EDD', '#22C55E', '#F59E0B', '#3B82F6', '#EC4899', '#EF4444', '#8B5CF6', '#14B8A6', '#F97316', '#06B6D4', '#84CC16', '#6366F1'];
            currentChartInstance = new Chart(ctx, { type: 'doughnut', data: { labels: labels, datasets: [{ data: data, backgroundColor: bgColors.slice(0, labels.length), borderWidth: 0, hoverOffset: 4 }] },
                options: { responsive: true, maintainAspectRatio: true, cutout: '65%', plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(context) {
                    const val = context.raw; const pct = totalValue > 0 ? (val / totalValue * 100).toFixed(1) + '%' : '0%'; return ` ${context.label}: ${displayMoney(val)} (${pct})`;
                }}}}}
            });
        }

        function renderView() {
            const container = document.getElementById('app-content');
            const hasTickers = currentTab === 'home' && currentSubView === 'tickers' && tickerData.rows.length > 0;
            if (activeData.length === 0 && !hasTickers) { container.innerHTML = '<p class="text-center p-10 dark:text-gray-400">No active records found.</p>'; return; }

            if (currentTab === 'home') {
                if (currentSubView === 'dashboard') renderDashboard(container);
                else if (currentSubView === 'networth') renderHome(container); 
                else if (currentSubView === 'tickers') renderTickers(container);
            } else if (currentTab.startsWith('cash')) {
                renderCash(container);
            } else {
                if (currentSubView === 'maturity') renderMaturity(container);
                else renderBankOrCompany(container);
            }
        }

        function renderCash(container) {
            let tbodyHtml = activeData.map((item, index) => {
                let amountDisplay = isEditingCash 
                    ? `<input type="number" id="cash-input-${index}" value="${item.amount}" class="w-full max-w-[120px] px-2 py-1 text-right bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded text-gray-900 dark:text-white outline-none focus:border-blue-500 font-bold" />`
                    : `${displayMoney(item.amount)}`;

                let formattedRate = item.interest;
                if (typeof formattedRate === 'number') {
                    formattedRate = Number((formattedRate * 100).toFixed(2)) + '%';
                } else if (typeof formattedRate === 'string' && formattedRate !== "" && formattedRate !== "N/A" && !formattedRate.includes('%')) {
                    let num = parseFloat(formattedRate);
                    if (!isNaN(num) && num > 0 && num < 1) formattedRate = Number((num * 100).toFixed(2)) + '%';
                    else if (!isNaN(num)) formattedRate = num + '%';
                }

                return `<tr class="border-b dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors">
                    <td class="p-3 text-left font-bold text-gray-800 dark:text-white align-middle">${item.bank}</td>
                    <td class="p-3 text-right font-bold text-gray-900 dark:text-gray-200 align-middle">${amountDisplay}</td>
                    <td class="p-3 text-right text-gray-500 dark:text-gray-400 align-middle">${formattedRate}</td>
                </tr>`;
            }).join('');

            const btnText = isEditingCash ? "Save" : "Edit";
            const btnColor = isEditingCash ? "bg-green-600 hover:bg-green-700" : "bg-[#5D6B7F] hover:bg-gray-700";

            container.innerHTML = `
                <div class="text-[10px] text-gray-500 dark:text-gray-400 font-bold uppercase tracking-wider mb-2 px-1">
                    Last Updated: <span class="text-gray-800 dark:text-gray-200">${cashTimestamp}</span>
                </div>
                <div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-6 overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 uppercase tracking-wider text-[10px] border-b dark:border-gray-600">
                            <tr>
                                <th class="p-3 text-left">Bank</th>
                                <th class="p-3 text-right">Amount</th>
                                <th class="p-3 text-right">Interest</th>
                            </tr>
                        </thead>
                        <tbody>${tbodyHtml}</tbody>
                    </table>
                </div>
                <div class="flex justify-end px-1 mb-8">
                    <button id="cash-action-btn" onclick="handleCashAction()" class="px-8 py-3 w-full sm:w-auto min-w-[140px] justify-center ${btnColor} text-white text-base font-extrabold rounded-lg shadow-md transition-colors active:scale-95 flex items-center">
                        ${btnText}
                    </button>
                </div>
            `;
        }

        async function handleCashAction() {
            if (!isEditingCash) {
                isEditingCash = true;
                renderView();
            } else {
                const btn = document.getElementById('cash-action-btn');
                btn.innerHTML = '<span class="loader"></span> Saving';
                btn.disabled = true;

                const updates = [];
                activeData.forEach((item, index) => {
                    const input = document.getElementById('cash-input-' + index);
                    if(input) {
                        const newVal = parseFloat(input.value) || 0;
                        item.amount = newVal; 
                        updates.push({ row: item.row, col: item.col, amount: newVal });
                    }
                });

                // Target the correct keyword block in Google Sheets
                const targetKeyword = currentTab === 'cash' ? "HT Cash" : "NCT Cash";

                try {
                    const response = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "UPDATE_CASH", keyword: targetKeyword, updates: updates })
                    });
                    const result = await response.json();
                    
                    if(result.error) throw new Error(result.error);
                    
                    cashTimestamp = result.timestamp;
                    isEditingCash = false;
                    updateStats();
                    renderView();
                } catch(e) {
                    alert("Save failed: " + e.message);
                    btn.innerHTML = 'Save';
                    btn.disabled = false;
                }
            }
        }

        function renderDashboard(container) {
            const grandTotal = activeData.reduce((sum, item) => sum + item.amount, 0);
            const classTotals = activeData.reduce((acc, item) => {
                const aClass = item.assetClass && item.assetClass !== '-' ? item.assetClass.trim() : 'Others';
                acc[aClass] = (acc[aClass] || 0) + item.amount; return acc;
            }, {});

            const sortedClasses = Object.keys(classTotals).sort((a, b) => classTotals[b] - classTotals[a]);
            const chartData = sortedClasses.map(key => classTotals[key]);
            const bgColors = ['#9D4EDD', '#22C55E', '#F59E0B', '#3B82F6', '#EC4899', '#EF4444', '#8B5CF6'];

            let html = `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-4 p-6 flex flex-col items-center">
                    <h2 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">Asset Allocation</h2>
                    <div class="relative w-full max-w-[240px] aspect-square"><canvas id="tabChart"></canvas></div></div>
                <div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 overflow-hidden mb-8"><ul class="divide-y dark:divide-gray-700">`;
            
            sortedClasses.forEach((label, i) => {
                const amount = classTotals[label]; const percent = grandTotal > 0 ? (amount / grandTotal * 100).toFixed(1) + '%' : '0.0%';
                html += `<li class="p-4 flex justify-between items-center text-sm dark:text-gray-200">
                    <div class="flex items-center gap-3 w-1/2"><span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: ${bgColors[i % bgColors.length]}"></span><span class="font-bold text-gray-800 dark:text-white uppercase tracking-wide truncate">${label}</span></div>
                    <div class="w-1/2 text-right flex flex-col"><span class="font-bold text-base leading-tight">${displayMoney(amount)}</span><span class="text-xs font-medium text-[#5D6B7F] dark:text-gray-400">${percent}</span></div></li>`;
            });
            container.innerHTML = html + `</ul></div>`; renderSharedChart('tabChart', sortedClasses, chartData, grandTotal);
        }

        function renderHome(container) {
            const totalAmount = activeData.reduce((sum, item) => sum + item.amount, 0);
            const sortedData = [...activeData].sort((a, b) => b.amount - a.amount);
            let html = `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-4 overflow-hidden">
                <div class="p-4 bg-gray-100 dark:bg-gray-700 flex justify-between items-center dark:text-white border-b dark:border-gray-600 gap-2">
                    <h3 class="font-bold text-gray-600 dark:text-gray-300 uppercase tracking-wider text-xs w-2/5">Asset</h3><h3 class="font-bold text-gray-600 dark:text-gray-300 uppercase tracking-wider text-xs w-1/5 text-center">Class</h3><h3 class="font-bold text-gray-600 dark:text-gray-300 uppercase tracking-wider text-xs w-2/5 text-right">Allocation</h3>
                </div><ul class="divide-y dark:divide-gray-700">`;

            sortedData.forEach(item => {
                const percent = totalAmount > 0 ? (item.amount / totalAmount * 100).toFixed(2) + '%' : '0.00%';
                html += `<li class="p-3 flex justify-between items-center text-sm dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors gap-2">
                    <div class="font-semibold text-gray-800 dark:text-white w-2/5 leading-tight break-words">${item.asset}</div>
                    <div class="text-[10px] font-bold text-[#5D6B7F] dark:text-gray-400 w-1/5 text-center leading-tight uppercase tracking-wide break-words">${item.assetClass || '-'}</div>
                    <div class="w-2/5 text-right flex flex-col justify-center"><span class="font-bold text-sm leading-tight">${displayMoney(item.amount)}</span><span class="text-xs font-medium text-[#5D6B7F] dark:text-gray-400 mt-1">${percent}</span></div></li>`;
            });
            container.innerHTML = html + `</ul></div>`;
        }

        function renderTickers(container) {
            if (!tickerData || !tickerData.rows || tickerData.rows.length === 0) { container.innerHTML = '<p class="text-center p-10 dark:text-gray-400">No ticker data found.</p>'; return; }
            let theadHtml = `<tr><th class="p-3 text-left w-2/5">TICKER</th>`;
            for (let i = 1; i < tickerData.headers.length; i++) { theadHtml += `<th class="p-3 text-right">${String(tickerData.headers[i]).toUpperCase()}</th>`; }
            theadHtml += `</tr>`;
            let tbodyHtml = tickerData.rows.map(row => {
                let rowHtml = `<tr class="hover:bg-gray-50 dark:hover:bg-gray-700/50 transition-colors"><td class="p-3 text-left font-bold text-gray-800 dark:text-white align-middle">${row.ticker}</td>`;
                row.values.forEach((val, idx) => {
                    const headerName = String(tickerData.headers[idx + 1]).toUpperCase(); let displayVal = val; let colorClass = "text-gray-800 dark:text-gray-200 font-semibold";
                    if (headerName.includes('%')) { let num = parseFloat(val); if (!isNaN(num)) {
                            if (typeof val === 'number' || (typeof val === 'string' && !val.includes('%'))) { displayVal = (num * 100).toFixed(2) + '%'; }
                            if (num > 0) { colorClass = "text-green-600 dark:text-green-400 font-bold"; if (!displayVal.toString().startsWith('+')) displayVal = "+" + displayVal;
                            } else if (num < 0) { colorClass = "text-red-600 dark:text-red-400 font-bold"; } else { colorClass = "text-gray-500 font-bold"; }
                        }
                    } else if (typeof val === 'number') { displayVal = Number.isInteger(val) ? val : parseFloat(val).toFixed(2); }
                    rowHtml += `<td class="p-3 text-right ${colorClass} align-middle">${displayVal}</td>`;
                });
                return rowHtml + `</tr>`;
            }).join('');
            container.innerHTML = `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-8 overflow-hidden"><div class="overflow-x-auto"><table class="w-full text-sm"><thead class="bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 uppercase tracking-wider text-xs border-b dark:border-gray-600">${theadHtml}</thead><tbody class="divide-y dark:divide-gray-700">${tbodyHtml}</tbody></table></div></div>`;
        }

        function renderMaturity(container) {
            const grandTotalVal = activeData.reduce((sum, item) => sum + (currentTab === 'ncd' ? item.amount : item.maturityAmount), 0);
            const groups = activeData.reduce((acc, item) => {
                const d = new Date(item.maturityDate), y = d.getFullYear(), m = d.toLocaleString('default', { month: 'long' });
                if(!acc[y]) acc[y] = { months: {}, total: 0 }; if(!acc[y].months[m]) acc[y].months[m] = { items: [], total: 0 };
                acc[y].months[m].items.push(item); acc[y].total += (currentTab === 'ncd' ? item.amount : item.maturityAmount); acc[y].months[m].total += (currentTab === 'ncd' ? item.amount : item.maturityAmount);
                return acc;
            }, {});

            const chartLabels = []; const chartData = [];
            Object.keys(groups).sort().forEach(y => { chartLabels.push(y); chartData.push(groups[y].total); });

            let html = `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-4 p-4 flex flex-col items-center"><h2 class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">Maturity Timeline</h2><div class="relative w-full max-w-[200px] aspect-square"><canvas id="tabChart"></canvas></div></div>`;
            Object.keys(groups).sort().forEach(y => {
                const yearlyTotal = groups[y].total; const yearPercent = grandTotalVal > 0 ? (yearlyTotal / grandTotalVal * 100).toFixed(1) : '0.0';
                html += `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-2 overflow-hidden"><button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-4 bg-gray-50 dark:bg-gray-700/50 flex justify-between font-bold dark:text-white text-lg"><span>${y}</span> <span>${yearPercent}%, ${displayMoney(yearlyTotal)}</span></button><div class="accordion-content">`;
                Object.keys(groups[y].months).sort((a, b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => {
                    groups[y].months[m].items.sort((a, b) => new Date(a.maturityDate) - new Date(b.maturityDate));
                    const monthlyTotal = groups[y].months[m].total; const percent = yearlyTotal > 0 ? (monthlyTotal / yearlyTotal * 100).toFixed(1) : '0.0';
                    html += `<div class="border-l-4 border-[#5D6B7F] ml-2"><button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-3 border-b dark:border-gray-700 flex justify-between text-sm font-semibold dark:text-gray-200"><span>${m}</span> <span>${percent}%, ${displayMoney(monthlyTotal)}</span></button><div class="accordion-content bg-gray-50 dark:bg-gray-800/50 overflow-x-auto">${renderTable(groups[y].months[m].items)}</div></div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html; renderSharedChart('tabChart', chartLabels, chartData, grandTotalVal);
        }

        function renderBankOrCompany(container) {
            const grandTotalInv = activeData.reduce((sum, item) => sum + item.amount, 0);
            const groups = activeData.reduce((acc, item) => {
                const groupKey = currentTab === 'ncd' ? item.company : item.bank;
                if(!acc[groupKey]) { acc[groupKey] = { items: [], total: 0, inv: 0, weightedRateSum: 0, weightedInv: 0 }; }
                acc[groupKey].items.push(item); acc[groupKey].inv += item.amount;
                let rateNum = parseFloat(String(item.rate).replace('%', ''));
                if (!isNaN(rateNum)) { acc[groupKey].weightedRateSum += (item.amount * rateNum); acc[groupKey].weightedInv += item.amount; }
                if (currentTab !== 'ncd') acc[groupKey].total += item.maturityAmount;
                return acc;
            }, {});

            const sortedBanks = Object.keys(groups).sort((a, b) => groups[b].inv - groups[a].inv);
            const chartLabels = sortedBanks; const chartData = sortedBanks.map(k => groups[k].inv);
            
            let html = `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-4 p-4 flex flex-col items-center"><h2 class="text-xs font-bold text-gray-500 dark:text-gray-400 mb-2 uppercase tracking-wider">${currentTab === 'ncd' ? 'NBFC Allocation' : 'Bank Allocation'}</h2><div class="relative w-full max-w-[200px] aspect-square"><canvas id="tabChart"></canvas></div></div>`;
            Object.keys(groups).sort().forEach(key => {
                groups[key].items.sort((a, b) => new Date(a.maturityDate) - new Date(b.maturityDate));
                const weightedAvgRate = (groups[key].weightedInv > 0) ? (groups[key].weightedRateSum / groups[key].weightedInv).toFixed(2) + '%' : 'N/A';
                const percentOfTotal = (grandTotalInv > 0) ? (groups[key].inv / grandTotalInv * 100).toFixed(1) + '%' : '0.0%';
                let statsHtml = currentTab === 'ncd' ? `<span class="text-gray-900 dark:text-white font-bold">${percentOfTotal}</span> , Inv: ${displayMoney(groups[key].inv)}, Int Rate: <span class="text-gray-900 dark:text-white font-bold">${weightedAvgRate}</span>` : `<span class="text-gray-900 dark:text-white font-bold">${percentOfTotal}</span> , Inv: ${displayMoney(groups[key].inv)}, Mat: <span class="text-gray-900 dark:text-white font-bold">${displayMoney(groups[key].total)}</span>, Int Rate: <span class="text-gray-900 dark:text-white font-bold">${weightedAvgRate}</span>`;
                html += `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-2 overflow-hidden"><button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-3 bg-gray-50 dark:bg-gray-700/50 flex flex-col items-start dark:text-white text-left"><h3 class="font-bold text-sm w-full pr-2 whitespace-normal break-words leading-tight mb-1">${key}</h3><div class="text-[10px] w-full leading-tight text-gray-500 dark:text-gray-400">${statsHtml}</div></button><div class="accordion-content bg-gray-50 dark:bg-gray-800/50 overflow-x-auto">${renderTable(groups[key].items)}</div></div>`;
            });
            container.innerHTML = html; renderSharedChart('tabChart', chartLabels, chartData, grandTotalInv);
        }

        function renderTable(items) {
            const isNCD = currentTab === 'ncd'; const isMaturity = currentSubView === 'maturity';
            let theadHtml = `<tr>${isMaturity ? `<th class="p-2 text-center w-1/3">${isNCD ? 'NBFC' : 'BANK'}</th>` : ''}<th class="p-2 text-center">Amt</th>${!isNCD ? `<th class="p-2 text-center">Mat.Amt</th>` : ''}<th class="p-2 text-center">Date</th><th class="p-2 text-center">Rate</th></tr>`;
            let tbodyHtml = items.map(item => {
                let formattedRate = String(item.rate); if (!formattedRate.includes('%') && formattedRate !== 'N/A') formattedRate += '%';
                return `<tr>${isMaturity ? `<td class="p-2 text-center font-medium text-gray-800 dark:text-gray-200 align-middle"><span class="block whitespace-normal break-words leading-tight mx-auto">${isNCD ? item.company : item.bank}</span></td>` : ''}<td class="p-2 text-center align-middle">${displayMoney(item.amount)}</td>${!isNCD ? `<td class="p-2 text-center font-bold text-gray-900 dark:text-white align-middle">${displayMoney(item.maturityAmount)}</td>` : ''}<td class="p-2 text-center font-semibold text-gray-600 dark:text-gray-400 align-middle">${new Date(item.maturityDate).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'2-digit'})}</td><td class="p-2 text-center align-middle">${formattedRate}</td></tr>`;
            }).join('');
            return `<table class="w-full text-[10px] dark:text-gray-300"><thead class="bg-gray-100 dark:bg-gray-700 text-gray-500 uppercase border-y dark:border-gray-600">${theadHtml}</thead><tbody class="divide-y dark:divide-gray-700">${tbodyHtml}</tbody></table>`;
        }
    </script>
</body>
</html>
