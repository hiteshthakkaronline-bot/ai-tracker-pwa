<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: 2000px; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300 pb-24">

    <header class="bg-[#5D6B7F] dark:bg-[#2D3748] p-4 text-white shadow-md sticky top-0 z-50 grid grid-cols-[40px_1fr_40px] items-center text-center">
        <button onclick="toggleTheme()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
        <div>
            <h1 id="header-title" class="text-lg font-bold uppercase tracking-tight">HT FDs</h1>
            <div id="global-stats" class="text-[10px] opacity-90">Initializing...</div>
        </div>
        <button onclick="togglePrivacy()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="privacy-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
    </header>

    <div id="sub-nav" class="flex border-b border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-[68px] z-40">
        <button onclick="showSubView('maturity')" class="flex-1 p-3 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white" id="btn-maturity">Maturity</button>
        <button onclick="showSubView('bank')" class="flex-1 p-3 font-bold text-gray-400 dark:text-gray-500" id="btn-bank">Bank-wise</button>
    </div>

    <section id="view-home" class="hidden-view p-10 text-center text-gray-400 font-bold mt-20">HOME VIEW CONTENT</section>
    <main id="app-content" class="p-2 space-y-4"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 h-20 flex justify-around items-center z-50 shadow-2xl transition-colors">
        <button onclick="switchMainTab('home')" id="nav-home" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011-1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchMainTab('fds')" id="nav-fds" class="flex flex-col items-center text-gray-900 dark:text-white">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">HT FDs</span>
        </button>
        <button onclick="switchMainTab('nct')" id="nav-nct" class="flex flex-col items-center text-gray-400">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
            <span class="text-[9px] mt-1 font-bold">NCT FDs</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzk4LUBXFiVq3U-8ojdCe5Xni9_yYqlPCBb_4X-F6afbJM9S-lV1-2N_ukVxUYYzQytTg/exec";
        let htData = [], nctData = [], activeData = [];
        let currentTab = 'fds', currentSubView = 'maturity', isPrivacyMode = true;
        const fmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });

        async function switchMainTab(tab) {
            currentTab = tab;
            const titles = { 'home': 'Home', 'fds': 'Hitesh FD\'s', 'nct': 'NCT FD\'s' };
            document.getElementById('header-title').innerText = titles[tab];
            document.getElementById('sub-nav').style.display = tab === 'home' ? 'none' : 'flex';
            document.getElementById('view-home').style.display = tab === 'home' ? 'block' : 'none';
            document.getElementById('app-content').style.display = tab === 'home' ? 'none' : 'block';

            // Active Nav Styling
            ['home', 'fds', 'nct'].forEach(t => {
                const btn = document.getElementById('nav-' + t);
                btn.className = `flex flex-col items-center ${t === tab ? 'text-gray-900 dark:text-white' : 'text-gray-400'}`;
            });

            if (tab === 'fds' || tab === 'nct') {
                document.getElementById('app-content').innerHTML = '<div class="flex justify-center p-10"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-gray-500"></div></div>';
                const userParam = tab === 'fds' ? 'HT' : 'NCT';
                const response = await fetch(`${API_URL}?user=${userParam}`);
                activeData = await response.json();
                updateStats();
                renderView();
            }
        }

        // Logic for renderView, renderTable, togglePrivacy, toggleTheme, etc. 
        // remains exactly the same, but use 'activeData' instead of 'rawData'.
        
        function updateStats() {
            const total = activeData.reduce((s, f) => s + f.amount, 0);
            const mat = activeData.reduce((s, f) => s + f.maturityAmount, 0);
            document.getElementById('global-stats').innerHTML = `Inv: ${displayMoney(total)} | Mat: ${displayMoney(mat)}`;
        }

        function renderView() {
            const container = document.getElementById('app-content');
            if (currentSubView === 'maturity') renderMaturity(container);
            else renderBank(container);
        }

        function renderMaturity(container) {
            // Same logic as your current file, but use activeData
        }

        function init() { switchMainTab('fds'); } // Start with Hitesh FDs
        
        // ... include your existing helper functions (validatePin, toggleTheme, etc.) ...
    </script>
</body>
</html>
