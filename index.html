<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tracker</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <style>
        .accordion-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .accordion-content.open { max-height: 2000px; }
        .hidden-view { display: none; }
    </style>
</head>
<body class="bg-white dark:bg-gray-900 transition-colors duration-300 pb-24">

    <div id="pin-overlay" class="fixed inset-0 bg-gray-200 dark:bg-gray-800 z-[100] flex flex-col items-center justify-center p-6 transition-opacity duration-500">
        <div class="bg-white dark:bg-gray-700 p-8 rounded-2xl shadow-2xl w-full max-w-xs text-center">
            <h2 class="text-xl font-bold text-gray-800 dark:text-white mb-6">Enter PIN</h2>
            <input type="password" id="pin-input" inputmode="numeric" maxlength="4" class="w-full text-center text-3xl tracking-[1em] p-3 border-2 border-gray-200 dark:border-gray-600 dark:bg-gray-800 dark:text-white rounded-lg focus:border-gray-500 outline-none mb-4" placeholder="****">
            <div id="pin-error" class="text-red-500 font-bold text-xs mb-4 hidden">Incorrect PIN.</div>
            <button onclick="validatePin()" class="w-full bg-gray-800 dark:bg-gray-100 dark:text-gray-900 text-white font-bold py-3 rounded-lg active:scale-95 transition-transform">Unlock</button>
        </div>
    </div>

    <header class="bg-[#5D6B7F] dark:bg-[#2D3748] p-4 text-white shadow-md sticky top-0 z-50 grid grid-cols-[40px_1fr_40px] items-center text-center">
        <button onclick="toggleTheme()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="theme-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
        <div>
            <h1 id="header-title" class="text-lg font-bold uppercase tracking-tight">HT FDs</h1>
            <div id="global-stats" class="text-[10px] opacity-90">Initializing...</div>
        </div>
        <button onclick="togglePrivacy()" class="p-2 hover:bg-white/10 rounded-full flex justify-center"><svg id="privacy-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg></button>
    </header>

    <div id="sub-nav" class="flex border-b border-gray-100 dark:border-gray-700 bg-white dark:bg-gray-800 sticky top-[68px] z-40">
        <button onclick="showSubView('maturity')" class="flex-1 p-3 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white" id="btn-maturity">Maturity</button>
        <button onclick="showSubView('bank')" class="flex-1 p-3 font-bold text-gray-400 dark:text-gray-500 border-none" id="btn-bank">Bank-wise</button>
    </div>

    <section id="view-home" class="hidden-view p-10 text-center text-gray-400 font-bold mt-20">HOME DASHBOARD CONTENT</section>
    
    <main id="app-content" class="p-2 space-y-4"></main>

    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 h-20 flex justify-around items-center z-50 shadow-2xl transition-colors">
        <button onclick="switchMainTab('home')" id="nav-home" class="flex flex-col items-center text-gray-400 w-1/4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011-1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">HOME</span>
        </button>
        <button onclick="switchMainTab('fds')" id="nav-fds" class="flex flex-col items-center text-gray-900 dark:text-white w-1/4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zM8 7a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zM14 4a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"></path></svg>
            <span class="text-[9px] mt-1 font-bold">HT FDs</span>
        </button>
        <button onclick="switchMainTab('nct')" id="nav-nct" class="flex flex-col items-center text-gray-400 w-1/4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"></path></svg>
            <span class="text-[9px] mt-1 font-bold">NCT FDs</span>
        </button>
        <button onclick="switchMainTab('ncd')" id="nav-ncd" class="flex flex-col items-center text-gray-400 w-1/4">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z"></path><path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" clip-rule="evenodd"></path></svg>
            <span class="text-[9px] mt-1 font-bold">HT NCDs</span>
        </button>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzk4LUBXFiVq3U-8ojdCe5Xni9_yYqlPCBb_4X-F6afbJM9S-lV1-2N_ukVxUYYzQytTg/exec"; // <-- PASTE NEW URL HERE
        const SECRET_PIN = "1549";
        
        let activeData = [];
        let currentTab = 'fds', currentSubView = 'maturity', isPrivacyMode = true;
        const fmt = new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 });
        const monthOrder = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

        // --- THEME ENGINE ---
        function applyInitialTheme() {
            const stored = localStorage.getItem('theme');
            const hour = new Date().getHours();
            const isNight = hour >= 18 || hour < 6; 
            const theme = stored || (isNight ? 'dark' : 'light');
            setTheme(theme);
        }

        function setTheme(theme) {
            const el = document.documentElement;
            if (theme === 'dark') el.classList.add('dark');
            else el.classList.remove('dark');
            localStorage.setItem('theme', theme);
            updateIcons();
        }

        function toggleTheme() {
            setTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
        }

        function updateIcons() {
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').innerHTML = isDark 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />` 
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;

            document.getElementById('privacy-icon').innerHTML = isPrivacyMode 
                ? `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268-2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"></path>` 
                : `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>`;
        }

        // --- NAVIGATION LOGIC ---
        async function switchMainTab(tab) {
            currentTab = tab;
            const titles = { 'home': 'Home', 'fds': 'Hitesh FD\'s', 'nct': 'NCT FD\'s', 'ncd': 'HT NCD\'s' };
            document.getElementById('header-title').innerText = titles[tab];
            
            // Adjust Sub-Nav Label for NCDs
            document.getElementById('btn-bank').innerText = (tab === 'ncd') ? 'Company-wise' : 'Bank-wise';
            
            document.getElementById('sub-nav').style.display = tab === 'home' ? 'none' : 'flex';
            document.getElementById('view-home').style.display = tab === 'home' ? 'block' : 'none';
            document.getElementById('app-content').style.display = tab === 'home' ? 'none' : 'block';

            ['home', 'fds', 'nct', 'ncd'].forEach(t => {
                const btn = document.getElementById('nav-' + t);
                btn.className = `flex flex-col items-center w-1/4 transition-colors ${t === tab ? 'text-gray-900 dark:text-white' : 'text-gray-400'}`;
            });

            if (tab !== 'home') {
                document.getElementById('app-content').innerHTML = '<div class="flex justify-center p-10"><div class="animate-spin rounded-full h-10 w-10 border-b-2 border-[#5D6B7F]"></div></div>';
                document.getElementById('global-stats').innerHTML = 'Fetching data...';
                
                try {
                    const userParam = tab === 'fds' ? 'HT' : (tab === 'nct' ? 'NCT' : 'NCD');
                    const response = await fetch(`${API_URL}?user=${userParam}`);
                    const data = await response.json();
                    
                    if (data.error) throw new Error(data.error);
                    
                    activeData = data;
                    updateStats();
                    renderView();
                } catch (e) {
                    console.error("App Crash Details:", e);
                    document.getElementById('app-content').innerHTML = `<div class="p-6 text-red-500 bg-red-50 rounded-lg text-sm font-bold border border-red-200">Connection Error:<br>${e.message}</div>`;
                    document.getElementById('global-stats').innerHTML = 'Error loading';
                }
            }
        }

        function showSubView(view) {
            currentSubView = view;
            const mBtn = document.getElementById('btn-maturity');
            const bBtn = document.getElementById('btn-bank');
            const active = "flex-1 p-3 font-bold text-gray-900 dark:text-white border-b-2 border-gray-900 dark:border-white";
            const inactive = "flex-1 p-3 font-bold text-gray-400 dark:text-gray-500 border-none";
            
            mBtn.className = view === 'maturity' ? active : inactive;
            bBtn.className = view === 'bank' ? active : inactive;
            renderView();
        }

        // --- AUTH & DATA ---
        function togglePrivacy() { isPrivacyMode = !isPrivacyMode; updateIcons(); updateStats(); renderView(); }
        function displayMoney(amt) { return isPrivacyMode ? fmt.format(amt).replace(/[0-9]/g, 'X') : fmt.format(amt); }

        function validatePin() {
            if (document.getElementById('pin-input').value === SECRET_PIN) {
                sessionStorage.setItem('isUnlocked', 'true');
                document.getElementById('pin-overlay').classList.add('opacity-0', 'pointer-events-none');
                init();
            } else {
                document.getElementById('pin-error').classList.remove('hidden');
                document.getElementById('pin-input').value = "";
            }
        }

        window.onload = () => {
            applyInitialTheme();
            if (sessionStorage.getItem('isUnlocked') === 'true') {
                document.getElementById('pin-overlay').style.display = 'none';
                init();
            }
        };

        function init() { switchMainTab('fds'); }

        function updateStats() {
            const total = activeData.reduce((s, item) => s + item.amount, 0);
            
            // For NCDs, we don't have a 'Maturity Amount' column from the script, so we just show Investment
            if (currentTab === 'ncd') {
                document.getElementById('global-stats').innerHTML = `Inv: ${displayMoney(total)}`;
            } else {
                const mat = activeData.reduce((s, f) => s + f.maturityAmount, 0);
                document.getElementById('global-stats').innerHTML = `Inv: ${displayMoney(total)} | Mat: ${displayMoney(mat)}`;
            }
        }

        function renderView() {
            const container = document.getElementById('app-content');
            if (currentSubView === 'maturity') renderMaturity(container);
            else renderBankOrCompany(container);
        }

        function renderMaturity(container) {
            const groups = activeData.reduce((acc, item) => {
                const d = new Date(item.maturityDate), y = d.getFullYear(), m = d.toLocaleString('default', { month: 'long' });
                if(!acc[y]) acc[y] = { months: {}, total: 0 };
                if(!acc[y].months[m]) acc[y].months[m] = { items: [], total: 0 };
                acc[y].months[m].items.push(item);
                
                // If it's an NCD, we track amount. If FD, maturityAmount.
                const valToAdd = currentTab === 'ncd' ? item.amount : item.maturityAmount;
                acc[y].total += valToAdd; 
                acc[y].months[m].total += valToAdd;
                return acc;
            }, {});

            let html = '';
            Object.keys(groups).sort().forEach(y => {
                html += `<div class="bg-white dark:bg-gray-800 rounded shadow-sm border dark:border-gray-700 mb-2 overflow-hidden">
                    <button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-4 bg-gray-50 dark:bg-gray-700/50 flex justify-between font-bold dark:text-white">
                        <span>Year ${y}</span> <span>${displayMoney(groups[y].total)}</span>
                    </button>
                    <div class="accordion-content">`;
                
                Object.keys(groups[y].months).sort((a, b) => monthOrder.indexOf(a) - monthOrder.indexOf(b)).forEach(m => {
                    groups[y].months[m].items.sort((a, b) => new Date(a.maturityDate) - new Date(b.maturityDate));

                    html += `<div class="border-l-4 border-[#5D6B7F] ml-2">
                        <button onclick="this.nextElementSibling.classList.toggle('open')" class="w-full p-3 border-b dark:border-gray-700 flex justify-between text-sm font-semibold dark:text-gray-200">
                            <span>${m}</span> <span>${displayMoney(groups[y].months[m].total)}</span>
                        </button>
                        <div class="accordion-content bg-gray-50 dark:bg-gray-800/50 overflow-x-auto">${renderTable(groups[y].months[m].items)}</div>
                    </div>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html || '<p class="text-center p-10 dark:text-gray-400">No active records found.</p>';
        }

        function renderBankOrCompany(container) {
            const groups = activeData.reduce((acc, item) => {
                // Determine if we group by Bank or Company
                const groupKey = currentTab === 'ncd' ? item.company : item.bank;
                
                if(!acc[groupKey]) acc[groupKey] = { items: [], total: 0, inv: 0 };
                acc[groupKey].items.push(item); 
                
                acc[groupKey].inv += item.amount;
                if (currentTab !== 'ncd') acc[groupKey].total += item.maturityAmount;
                
                return acc;
            }, {});

            let html = '';
            Object.keys(groups).sort().forEach(key => {
                groups[key].items.sort((a, b) => new Date(a.maturityDate) - new Date(b.maturityDate));

                const statsHtml = currentTab === 'ncd' 
                    ? `Inv: <b class="text-gray-900 dark:text-white">${displayMoney(groups[key].inv)}</b>`
                    : `Inv: ${displayMoney(groups[key].inv)}<br><b class="text-gray-900 dark:text-white">Mat: ${displayMoney(groups[key].total)}</b>`;

                html += `<div class="bg-white dark:bg-gray-800 rounded shadow border dark:border-gray-700 mb-4 overflow-hidden">
                    <div class="p-3 bg-gray-100 dark:bg-gray-700 flex justify-between dark:text-white">
                        <h3 class="font-bold text-sm w-2/3 truncate pr-2">${key}</h3>
                        <div class="text-[10px] text-right w-1/3">${statsHtml}</div>
                    </div>
                    <div class="overflow-x-auto">${renderTable(groups[key].items)}</div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderTable(items) {
            // Adjust table header based on if it's NCD or FD
            const secondColHeader = currentTab === 'ncd' ? 'Company' : 'Mat.Amt';
            
            return `<table class="w-full text-[10px] dark:text-gray-300">
                <thead class="bg-gray-50 dark:bg-gray-700 text-gray-500 uppercase">
                    <tr>
                        <th class="p-2 text-center">Amt</th>
                        <th class="p-2 text-center">${secondColHeader}</th>
                        <th class="p-2 text-center">Date</th>
                        <th class="p-2 text-center">Rate</th>
                    </tr>
                </thead>
                <tbody class="divide-y dark:divide-gray-700">
                    ${items.map(item => {
                        // Adjust row data based on NCD vs FD
                        const secondColData = currentTab === 'ncd' 
                            ? `<span class="truncate block w-20 mx-auto">${item.company}</span>` 
                            : `${displayMoney(item.maturityAmount)}`;
                            
                        return `<tr>
                            <td class="p-2 text-center">${displayMoney(item.amount)}</td>
                            <td class="p-2 text-center font-bold text-gray-900 dark:text-white">${secondColData}</td>
                            <td class="p-2 text-center font-semibold text-gray-600 dark:text-gray-400">${new Date(item.maturityDate).toLocaleDateString('en-IN', {day:'2-digit', month:'short', year:'2-digit'})}</td>
                            <td class="p-2 text-center">${item.rate}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>`;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js'); });
        }
    </script>
</body>
</html>
